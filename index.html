<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Übungskatalog — Kiran Banakar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { transition: background 0.4s ease, color 0.4s ease; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
  ::-webkit-scrollbar-track { background: transparent; }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
(function() {
  var h = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useCallback = React.useCallback;

  var THEMES = {
    dark: {
      bg:"#0d0d0d",cardBg:"#141414",cardBorder:"#1f1f1f",text:"#f3efe8",
      textSecondary:"#999",textMuted:"#666",textFaint:"#444",accent:"#D4AF37",
      accentMuted:"#8B7355",inputBg:"#0a0a0a",detailBg:"#0a0a0a",
      btnSecBg:"#333",btnSecTxt:"#999",separator:"#1f1f1f",
      progressTrack:"#1a1a1a",dotOff:"#333",lvlBorder:"#444",
      resetTxt:"#444",toggleBg:"#1f1f1f"
    },
    light: {
      bg:"#f8f6f1",cardBg:"#ffffff",cardBorder:"#e8e3d9",text:"#1a1a1a",
      textSecondary:"#555",textMuted:"#888",textFaint:"#bbb",accent:"#8B6914",
      accentMuted:"#a08450",inputBg:"#f0ece3",detailBg:"#f5f2eb",
      btnSecBg:"#e8e3d9",btnSecTxt:"#666",separator:"#e8e3d9",
      progressTrack:"#e8e3d9",dotOff:"#d0c9bc",lvlBorder:"#ccc",
      resetTxt:"#bbb",toggleBg:"#e8e3d9"
    }
  };

  var AREAS = [
    { id:"mindset",sym:"\u2726",name:"Mindset & Inneres Spiel",
      col:{dark:"#D4AF37",light:"#8B6914"},vorb:["Jordan","Rockefeller","Jiro","Sleep"],
      drills:[
        {id:"m1",name:"Shamatha-Meditation",skill:"Fokus & Impulskontrolle",brain:"ACC + PFC",desc:"Atemfokus. Bei Abdriften: bemerken, benennen, zur\u00fcckkehren. Jedes Zur\u00fcckkehren = 1 Rep.",metric:"Minuten am St\u00fcck",levels:[10,15,20,30,45],unit:"min",freq:"t\u00e4glich"},
        {id:"m2",name:"Transition Ritual",skill:"Compartmentalization",brain:"PFC + DMN",desc:"Bewusster Schalter zwischen Lebensbereichen. Jordans Switch. 3 Atemz\u00fcge, alter Modus ablegen, neuer Modus an.",metric:"Saubere \u00dcberg\u00e4nge pro Tag",levels:[2,3,5,7,10],unit:"\u00d7/Tag",freq:"t\u00e4glich"},
        {id:"m3",name:"Sonntags-Reflexion",skill:"Selbstwahrnehmung & Kurskorrektur",brain:"DMN + PFC",desc:"Was lief gut? Was justiere ich? Jiros Qualit\u00e4tskontrolle auf dein ganzes Leben angewandt.",metric:"Wochen in Folge",levels:[4,8,12,26,52],unit:"Wochen",freq:"w\u00f6chentlich"},
        {id:"m4",name:"Impulse Surfing",skill:"Impulskontrolle",brain:"PFC + ACC",desc:"Ablenkungsimpuls bemerken, benennen, vorbeiziehen lassen. Nicht nachgeben.",metric:"Beobachtete & \u00fcberstandene Impulse",levels:[3,5,10,15,20],unit:"\u00d7/Tag",freq:"t\u00e4glich"}
      ]},
    { id:"focus",sym:"\u25ce",name:"Fokus & Deep Work",
      col:{dark:"#5B8C3E",light:"#2D5016"},vorb:["Kobe","Jiro","Sleep"],
      drills:[
        {id:"f1",name:"Deep Work Block",skill:"Tiefe Konzentration",brain:"Dorsolateraler PFC + Parietalkortex",desc:"Ununterbrochene Arbeit am wichtigsten Projekt. Handy weg, T\u00fcr zu, eine Aufgabe. Kobes 4am-Sessions.",metric:"Minuten am St\u00fcck ohne Unterbrechung",levels:[25,45,60,90,120],unit:"min",freq:"t\u00e4glich"},
        {id:"f2",name:"Single-Tasking Praxis",skill:"Pr\u00e4senz im Moment",brain:"PFC + Insula",desc:"Eine Sache tun. Essen ohne Handy. Gehen ohne Podcast. Gespr\u00e4ch ohne nebenbei tippen.",metric:"Bewusste Single-Task-Momente",levels:[2,4,6,8,12],unit:"\u00d7/Tag",freq:"t\u00e4glich"},
        {id:"f3",name:"Musik analytisch h\u00f6ren",skill:"Selektive Aufmerksamkeit",brain:"Temporaler Kortex + Insula",desc:"Ein Musikst\u00fcck, nur eine Stimme verfolgen (Bass, Geige, Drums). Dann wechseln.",metric:"Minuten fokussiertes H\u00f6ren",levels:[5,10,15,20,30],unit:"min",freq:"3\u00d7/Woche"}
      ]},
    { id:"pe",sym:"\u2b21",name:"Micro-PE & Imperium",
      col:{dark:"#6A8EAE",light:"#1a1a2e"},vorb:["Del Vecchio","Arnault","Dyson","Buffett"],
      drills:[
        {id:"p1",name:"Deal Sourcing Session",skill:"Mustererkennung & Marktintuition",brain:"PFC + Pattern Recognition",desc:"90 Min Deep Work: Unternehmen scannen, bewerten, Notizen machen. Arnaults Auge f\u00fcr verborgenen Wert.",metric:"Unternehmen analysiert pro Woche",levels:[3,5,10,15,25],unit:"Deals/Wo",freq:"t\u00e4glich (90min)"},
        {id:"p2",name:"Jahresabschluss-Lesen",skill:"Financial Literacy & Bewertung",brain:"Analytisches Denken",desc:"Einen Jahresabschluss komplett durcharbeiten. Kennzahlen berechnen. Buffetts F\u00e4higkeit, Zahlen zu lesen wie Geschichten.",metric:"Jahresabschl\u00fcsse durchgearbeitet",levels:[5,15,30,50,100],unit:"gesamt",freq:"2\u00d7/Woche"},
        {id:"p3",name:"LinkedIn Strategic Post",skill:"Personal Brand & Netzwerk",brain:"Kommunikation",desc:"Ein durchdachter Post oder Kommentar. Nicht Zeitvertreib, sondern strategisches Tool.",metric:"Posts/Kommentare pro Woche",levels:[1,2,3,5,7],unit:"\u00d7/Woche",freq:"regelm\u00e4\u00dfig"},
        {id:"p4",name:"Verhandlungs-Simulation",skill:"\u00dcberzeugungskraft & Composure",brain:"PFC + Insula",desc:"Szenarien durchspielen: Kaufpreis, Konditionen, Einw\u00e4nde. Rockefellers stille Aura.",metric:"Szenarien durchgespielt",levels:[5,15,30,50,100],unit:"gesamt",freq:"1\u00d7/Woche"}
      ]},
    { id:"body",sym:"\u25cb",name:"K\u00f6rper & Athletik",
      col:{dark:"#C0503A",light:"#8B2500"},vorb:["Kobe","Jordan"],
      drills:[
        {id:"b1",name:"Laufen (aerob)",skill:"Ausdauer & BDNF-Produktion",brain:"Hippocampus + PFC",desc:"30\u201345 Min im aeroben Bereich. Kobes unverhandelbare Basis.",metric:"km pro Woche",levels:[10,15,20,30,40],unit:"km/Wo",freq:"3\u00d7/Woche"},
        {id:"b2",name:"Gewichtheben",skill:"Kraft & kognitive Geschwindigkeit",brain:"Motorischer Kortex + PFC",desc:"Strukturiertes Krafttraining. Starke Effekte auf Aufmerksamkeit und Verarbeitungsgeschwindigkeit.",metric:"Sessions pro Woche (Streak)",levels:[1,2,3,3,3],unit:"\u00d7/Woche",freq:"3\u00d7/Woche"},
        {id:"b3",name:"Yoga",skill:"Flexibilit\u00e4t & K\u00f6rperwahrnehmung",brain:"Insula + DMN-Regulation",desc:"K\u00f6rperwahrnehmung sch\u00e4rfen. Die Br\u00fccke zwischen K\u00f6rper und Geist.",metric:"Sessions pro Woche",levels:[1,1,2,2,2],unit:"\u00d7/Woche",freq:"2\u00d7/Woche"},
        {id:"b4",name:"Schlaf-Protokoll",skill:"Recovery & PFC-Regeneration",brain:"Gesamtes Gehirn",desc:"8h Schlaf als nicht verhandelbare Grenze. Ohne Schlaf kein Fortschritt.",metric:"N\u00e4chte mit 7.5h+ in Folge",levels:[7,14,30,60,90],unit:"N\u00e4chte",freq:"t\u00e4glich"}
      ]},
    { id:"brain",sym:"\u25c8",name:"Kognitives Training",
      col:{dark:"#9B72CF",light:"#4A235A"},vorb:["Jiro","Sleep"],
      drills:[
        {id:"br1",name:"Jonglieren",skill:"Neuroplastizit\u00e4t & Mustererkennung",brain:"Visueller Kortex + Cerebellum",desc:"Sukzessive steigern: 3 \u2192 4 \u2192 5 \u2192 6 B\u00e4lle. Jeder Ball = qualitativ neues Training.",metric:"Anzahl B\u00e4lle (saubere Catches)",levels:[3,3,4,5,6],unit:"B\u00e4lle",freq:"t\u00e4glich 15min"},
        {id:"br2",name:"Lesen (Morgens + Abends)",skill:"Wissensakkumulation",brain:"Gesamtes Kortex",desc:"Der Tag beginnt und endet mit Wachstum. Sleeps Qualit\u00e4tsprinzip.",metric:"B\u00fccher pro Quartal",levels:[3,5,8,12,15],unit:"B\u00fccher/Q",freq:"t\u00e4glich"},
        {id:"br3",name:"Umgebung h\u00f6ren",skill:"Auditive Sch\u00e4rfe & Pr\u00e4senz",brain:"Temporaler Kortex + Insula",desc:"5 Min Augen zu: jedes Ger\u00e4usch identifizieren und lokalisieren.",metric:"Minuten bewusstes H\u00f6ren",levels:[3,5,7,10,15],unit:"min",freq:"t\u00e4glich"}
      ]},
    { id:"vater",sym:"\u25b3",name:"Vaterschaft",
      col:{dark:"#4CAF7D",light:"#0B5345"},vorb:["Kiran Banakar"],
      drills:[
        {id:"v1",name:"Ungeteilte Aufmerksamkeit",skill:"Pr\u00e4senz & Bindung",brain:"Insula + PFC",desc:"30 Min: nur Sohn, Handy weg. Jordans Schalter: wenn ich mit ihm bin, bin ich nur mit ihm.",metric:"Minuten pro Tag (Streak)",levels:[15,20,30,30,45],unit:"min/Tag",freq:"t\u00e4glich"},
        {id:"v2",name:"Vorlese-Ritual",skill:"Verbindung & Best\u00e4ndigkeit",brain:"Sprachzentren + Bonding",desc:"Abends vorlesen. Stabilit\u00e4t und Vertrauen bauen.",metric:"Abende in Folge",levels:[7,14,30,60,100],unit:"Abende",freq:"t\u00e4glich"}
      ]},
    { id:"ehe",sym:"\u25c7",name:"Ehe & Partnerschaft",
      col:{dark:"#C4836A",light:"#6B3A2A"},vorb:["Jacobs","Buffett"],
      drills:[
        {id:"e1",name:"Echtes Gespr\u00e4ch",skill:"Emotionale Tiefe & Transparenz",brain:"Insula + PFC + Mirror Neurons",desc:"Nicht Logistik, sondern echte Verbindung. Jacobs' Love Vibe.",metric:"Tiefe Gespr\u00e4che pro Woche",levels:[1,2,3,4,5],unit:"\u00d7/Woche",freq:"regelm\u00e4\u00dfig"},
        {id:"e2",name:"Wertsch\u00e4tzung zeigen",skill:"Bewusste Dankbarkeit",brain:"PFC + Limbisches System",desc:"Nicht nur denken, sondern aussprechen. Jeden Tag mindestens eine konkrete Wertsch\u00e4tzung.",metric:"Tage in Folge",levels:[7,14,30,60,100],unit:"Tage",freq:"t\u00e4glich"}
      ]},
    { id:"pflege",sym:"\u25a1",name:"Pflege des Vaters",
      col:{dark:"#8A8A8A",light:"#4A4A4A"},vorb:["Rockefeller","Kiran Banakar"],
      drills:[
        {id:"pf1",name:"Geduld als \u00dcbung",skill:"Emotionale Regulation & Composure",brain:"ACC + PFC + Insula",desc:"Rockefellers Composure. In schwierigen Momenten: Ruhe projizieren. 3 Atemz\u00fcge vor jeder Reaktion.",metric:"Bewusste Geduld-Momente pro Woche",levels:[3,5,7,10,15],unit:"\u00d7/Woche",freq:"situativ"},
        {id:"pf2",name:"Mutter aktiv entlasten",skill:"Proaktivit\u00e4t & F\u00fcrsorge",brain:"PFC (Planung)",desc:"Nicht warten bis sie fragt. Vorausdenken, anbieten, \u00fcbernehmen.",metric:"Proaktive Handlungen pro Woche",levels:[2,3,5,7,10],unit:"\u00d7/Woche",freq:"regelm\u00e4\u00dfig"}
      ]}
  ];

  var LN = ["Anf\u00e4nger","Fortgeschritten","Solide","Stark","Weltklasse"];
  var LC = ["#9E9E9E","#78909C","#5C6BC0","#FF8F00","#D4AF37"];
  var SK = "kiran-uebungskatalog-v3";
  var TK = "kiran-theme-pref";

  function li(cur, lvls) {
    if (cur <= 0) return -1;
    var idx = 0;
    for (var i = 0; i < lvls.length; i++) { if (cur >= lvls[i]) idx = i; }
    return idx;
  }

  function ProgressBar(p) {
    var t = THEMES[p.theme], mx = p.levels[p.levels.length-1];
    var pct = Math.min((p.current/mx)*100,100), l = li(p.current,p.levels);
    return h("div",{style:{marginTop:8}},
      h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:t.textMuted,marginBottom:3,fontFamily:"'DM Sans',sans-serif"}},
        h("span",{style:{color:l>=0?LC[l]:t.textFaint,fontWeight:700}},l>=0?LN[l]:"\u2014"),
        h("span",null,p.current+" / "+mx)
      ),
      h("div",{style:{height:6,background:t.progressTrack,borderRadius:3,overflow:"hidden"}},
        h("div",{style:{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+p.color+"88,"+p.color+")",borderRadius:3,transition:"width 0.5s ease"}})
      ),
      h("div",{style:{display:"flex",justifyContent:"space-between",marginTop:2}},
        p.levels.map(function(lv,i){return h("div",{key:i,style:{width:4,height:4,borderRadius:2,background:p.current>=lv?LC[i]:t.dotOff,transition:"background 0.3s"}})})
      )
    );
  }

  function App() {
    var _th = useState(function(){try{return localStorage.getItem(TK)||"dark"}catch(e){return"dark"}}), theme=_th[0], setTheme=_th[1];
    var _d = useState({}), data=_d[0], setData=_d[1];
    var _a = useState(null), activeArea=_a[0], setActiveArea=_a[1];
    var _e = useState(null), expDrill=_e[0], setExpDrill=_e[1];
    var _ed = useState(null), editDrill=_ed[0], setEditDrill=_ed[1];
    var _ev = useState(""), editVal=_ev[0], setEditVal=_ev[1];
    var _l = useState(false), loaded=_l[0], setLoaded=_l[1];
    var t = THEMES[theme];

    useEffect(function(){try{var s=localStorage.getItem(SK);if(s)setData(JSON.parse(s))}catch(e){}setLoaded(true)},[]);
    useEffect(function(){document.body.style.background=t.bg;document.body.style.color=t.text},[theme]);

    var save = useCallback(function(nd){setData(nd);try{localStorage.setItem(SK,JSON.stringify(nd))}catch(e){}},[]);
    function toggle(){var n=theme==="dark"?"light":"dark";setTheme(n);try{localStorage.setItem(TK,n)}catch(e){}}
    function updDrill(did,val){var nv=parseFloat(val);if(isNaN(nv))return;var p=data[did]||{current:0,history:[]};var nd=Object.assign({},data);nd[did]={current:nv,history:(p.history||[]).concat([{value:nv,date:new Date().toISOString().split("T")[0]}])};save(nd);setEditDrill(null);setEditVal("")}
    function reset(){if(confirm("Alle Fortschritte zur\u00fccksetzen?"))save({})}

    if(!loaded)return null;

    var totalD=AREAS.reduce(function(s,a){return s+a.drills.length},0);
    var activeD=AREAS.reduce(function(s,a){return s+a.drills.filter(function(d){return data[d.id]&&data[d.id].current>0}).length},0);
    var selArea=AREAS.find(function(a){return a.id===activeArea});
    function gc(a){return a.col[theme]}

    // Font shortcuts
    var dm = "'DM Sans',sans-serif";
    var pf = "'Playfair Display',Georgia,serif";

    return h("div",{style:{minHeight:"100vh",background:t.bg,color:t.text,fontFamily:pf,padding:"20px 16px 40px",maxWidth:640,margin:"0 auto",transition:"background 0.4s ease,color 0.4s ease"}},

      // Toggle
      h("div",{style:{display:"flex",justifyContent:"flex-end",marginBottom:8}},
        h("div",{onClick:toggle,style:{cursor:"pointer",padding:"6px 14px",borderRadius:20,background:t.toggleBg,color:t.textSecondary,fontSize:12,fontFamily:dm,fontWeight:500,display:"flex",alignItems:"center",gap:6,transition:"background 0.3s,color 0.3s",userSelect:"none"}},
          h("span",{style:{fontSize:14}},theme==="dark"?"\u2600":"\u263e"),
          theme==="dark"?"Light Mode":"Dark Mode"
        )
      ),

      // Header
      h("div",{style:{textAlign:"center",marginBottom:32}},
        h("div",{style:{fontSize:9,letterSpacing:4,textTransform:"uppercase",color:t.accent,marginBottom:8,fontFamily:dm}},"\u00dcbungskatalog"),
        h("h1",{style:{fontSize:26,fontWeight:400,margin:0,lineHeight:1.3,color:t.text}},"The Fundamentals"),
        h("div",{style:{fontSize:12,color:t.accentMuted,marginTop:10,fontStyle:"italic",lineHeight:1.6}},
          "\u201eMein ganzes Leben als Lebenswerk \u2014 mit der Intensit\u00e4t von Jordan,",h("br"),
          "der Geduld von Dyson, der Handwerkskunst von Jiro.\u201c"
        ),
        h("div",{style:{marginTop:16,display:"flex",justifyContent:"center",gap:24,fontSize:11,color:t.textMuted,fontFamily:dm}},
          h("span",null,h("span",{style:{color:t.accent,fontWeight:700,fontSize:16}},activeD)," / "+totalD+" aktiv"),
          h("span",null,h("span",{style:{color:t.accent,fontWeight:700,fontSize:16}},AREAS.length)," Bereiche")
        )
      ),

      // Area List
      !activeArea && h("div",null,
        AREAS.map(function(area,idx){
          var c=gc(area);
          var aa=area.drills.filter(function(d){return data[d.id]&&data[d.id].current>0}).length;
          var wc=area.drills.filter(function(d){return(data[d.id]&&data[d.id].current||0)>=d.levels[d.levels.length-1]}).length;
          return h("div",{key:area.id,onClick:function(){setActiveArea(area.id)},style:{background:t.cardBg,border:"1px solid "+c+"22",borderLeft:"3px solid "+c,borderRadius:6,padding:"16px 18px",marginBottom:10,cursor:"pointer",transition:"all 0.2s",animation:"fadeSlideIn 0.4s ease "+(idx*0.05)+"s both"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div",{style:{display:"flex",alignItems:"center",gap:12}},
                h("span",{style:{fontSize:22,color:c,opacity:0.85}},area.sym),
                h("div",null,
                  h("div",{style:{fontSize:14,fontWeight:600,color:t.text}},area.name),
                  h("div",{style:{fontSize:10,color:t.textMuted,marginTop:2,fontFamily:dm}},area.vorb.join(" \u00b7 "))
                )
              ),
              h("div",{style:{textAlign:"right",fontFamily:dm}},
                h("div",{style:{fontSize:10,color:t.textMuted}},aa+"/"+area.drills.length+" aktiv"),
                wc>0&&h("div",{style:{fontSize:9,color:t.accent,marginTop:2}},wc+"\u00d7 Weltklasse")
              )
            )
          )
        }),
        h("div",{onClick:reset,style:{textAlign:"center",marginTop:30,fontSize:10,color:t.resetTxt,cursor:"pointer",padding:8,fontFamily:dm}},"Fortschritte zur\u00fccksetzen")
      ),

      // Detail View
      selArea && (function(){
        var c=gc(selArea);
        return h("div",{style:{animation:"fadeSlideIn 0.3s ease"}},
          h("div",{onClick:function(){setActiveArea(null);setExpDrill(null)},style:{fontSize:11,color:t.accent,cursor:"pointer",marginBottom:20,fontFamily:dm,display:"flex",alignItems:"center",gap:6}},"\u2190 Zur\u00fcck"),
          h("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:8}},
            h("span",{style:{fontSize:30,color:c}},selArea.sym),
            h("div",null,
              h("h2",{style:{margin:0,fontSize:20,fontWeight:400,color:t.text}},selArea.name),
              h("div",{style:{fontSize:10,color:t.textMuted,fontFamily:dm,marginTop:2}},selArea.vorb.join(" \u00b7 "))
            )
          ),
          h("div",{style:{height:1,background:c+"33",margin:"16px 0 20px"}}),

          selArea.drills.map(function(drill,idx){
            var isExp=expDrill===drill.id;
            var cur=(data[drill.id]&&data[drill.id].current)||0;
            var hist=(data[drill.id]&&data[drill.id].history)||[];
            var isEd=editDrill===drill.id;
            var l=li(cur,drill.levels);

            return h("div",{key:drill.id,style:{background:t.cardBg,border:"1px solid "+(isExp?c+"44":t.cardBorder),borderRadius:6,marginBottom:10,overflow:"hidden",animation:"fadeSlideIn 0.3s ease "+(idx*0.06)+"s both",transition:"border-color 0.3s"}},

              // Drill header
              h("div",{onClick:function(){setExpDrill(isExp?null:drill.id)},style:{padding:"14px 16px",cursor:"pointer"}},
                h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
                  h("div",{style:{flex:1}},
                    h("div",{style:{fontSize:14,fontWeight:600,color:t.text,marginBottom:3}},drill.name),
                    h("div",{style:{fontSize:10,color:c,fontFamily:dm,letterSpacing:0.5}},drill.skill)
                  ),
                  h("div",{style:{fontSize:10,padding:"3px 8px",borderRadius:3,background:l>=0?LC[l]+"22":t.detailBg,color:l>=0?LC[l]:t.textFaint,fontFamily:dm,fontWeight:600,whiteSpace:"nowrap"}},l>=0?LN[l]:"Noch nicht gestartet")
                ),
                h(ProgressBar,{current:cur,levels:drill.levels,color:c,theme:theme})
              ),

              // Expanded
              isExp&&h("div",{style:{padding:"0 16px 16px",borderTop:"1px solid "+t.separator}},
                h("div",{style:{fontSize:12,color:t.textSecondary,lineHeight:1.7,marginTop:12,marginBottom:14,padding:"10px 12px",background:t.detailBg,borderLeft:"2px solid "+c+"44",borderRadius:3}},drill.desc),

                h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14,fontSize:10,fontFamily:dm}},
                  h("div",{style:{background:t.detailBg,padding:"8px 10px",borderRadius:3}},
                    h("div",{style:{color:t.textMuted,marginBottom:2}},"Gehirnareal"),
                    h("div",{style:{color:t.textSecondary}},drill.brain)
                  ),
                  h("div",{style:{background:t.detailBg,padding:"8px 10px",borderRadius:3}},
                    h("div",{style:{color:t.textMuted,marginBottom:2}},"Frequenz"),
                    h("div",{style:{color:t.textSecondary}},drill.freq)
                  ),
                  h("div",{style:{background:t.detailBg,padding:"8px 10px",borderRadius:3,gridColumn:"1/-1"}},
                    h("div",{style:{color:t.textMuted,marginBottom:2}},"Messgr\u00f6\u00dfe"),
                    h("div",{style:{color:t.textSecondary}},drill.metric)
                  )
                ),

                // Level roadmap
                h("div",{style:{marginBottom:14}},
                  h("div",{style:{fontSize:9,letterSpacing:2,color:t.textMuted,textTransform:"uppercase",marginBottom:8,fontFamily:dm}},"Level-Roadmap"),
                  drill.levels.map(function(lev,i){
                    return h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"5px 0",opacity:cur>=lev?1:0.4}},
                      h("div",{style:{width:8,height:8,borderRadius:4,background:cur>=lev?LC[i]:"transparent",border:cur>=lev?"none":"1px solid "+t.lvlBorder,flexShrink:0}}),
                      h("div",{style:{fontSize:11,color:cur>=lev?t.text:t.textMuted,flex:1,fontFamily:dm}},LN[i]),
                      h("div",{style:{fontSize:11,color:cur>=lev?LC[i]:t.textFaint,fontWeight:600,fontFamily:dm}},lev+" "+drill.unit)
                    )
                  })
                ),

                // Update button / input
                !isEd
                  ? h("div",{onClick:function(e){e.stopPropagation();setEditDrill(drill.id);setEditVal(String(cur))},style:{background:c,color:"#fff",textAlign:"center",padding:"10px 16px",borderRadius:4,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:dm,letterSpacing:0.5}},"Fortschritt aktualisieren")
                  : h("div",{style:{display:"flex",gap:8},onClick:function(e){e.stopPropagation()}},
                      h("input",{type:"number",value:editVal,onInput:function(e){setEditVal(e.target.value)},onKeyDown:function(e){if(e.key==="Enter")updDrill(drill.id,editVal)},autoFocus:true,placeholder:"Wert ("+drill.unit+")",style:{flex:1,background:t.inputBg,border:"1px solid "+c+"66",color:t.text,padding:"10px 12px",borderRadius:4,fontSize:13,outline:"none",fontFamily:dm}}),
                      h("div",{onClick:function(){updDrill(drill.id,editVal)},style:{background:c,color:"#fff",padding:"10px 16px",borderRadius:4,fontSize:12,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",fontFamily:dm}},"\u2713"),
                      h("div",{onClick:function(){setEditDrill(null);setEditVal("")},style:{background:t.btnSecBg,color:t.btnSecTxt,padding:"10px 12px",borderRadius:4,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center"}},"\u2715")
                    ),

                // History
                hist.length>0&&h("div",{style:{marginTop:12}},
                  h("div",{style:{fontSize:9,letterSpacing:2,color:t.textMuted,textTransform:"uppercase",marginBottom:6,fontFamily:dm}},"Verlauf"),
                  h("div",{style:{maxHeight:80,overflowY:"auto"}},
                    hist.slice().reverse().slice(0,5).map(function(hh,i){
                      return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",fontSize:10,color:t.textMuted,padding:"3px 0",fontFamily:dm}},
                        h("span",null,hh.date),
                        h("span",{style:{color:t.textSecondary}},hh.value+" "+drill.unit)
                      )
                    })
                  )
                )
              )
            )
          })
        )
      })(),

      // Footer
      h("div",{style:{textAlign:"center",marginTop:40,fontSize:10,color:t.textFaint,fontFamily:dm,lineHeight:1.6}},
        "Kiran Banakar \u00b7 \u00dcbungskatalog v1",h("br"),"Jeden Tag ein St\u00fcck besser \u2014 Nick Sleeps Qualit\u00e4tsprinzip"
      )
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>
</body>
</html>
